<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>no-end-for-learning</title>
  <style>
    :root {
      color-scheme: light dark;
    }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }
    header {
      padding: 12px 16px;
      border-bottom: 1px solid #ccc;
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
    }
    main {
      height: calc(100vh - 54px);
    }
    iframe {
      border: 0;
      width: 100%;
      height: 100%;
    }
    a {
      text-decoration: none;
    }
  </style>
</head>
<body>
  <header>
    <strong>在线预览：note.pdf</strong>
    <a href="./note.pdf" target="_blank" rel="noopener noreferrer">新标签打开 / 下载 PDF</a>
  </header>
  <main>
    <iframe src="./note.pdf" title="note.pdf 预览">
      你的浏览器不支持内嵌 PDF，请点击上方链接打开。
    </iframe>
  </main>
</body>
</html>
